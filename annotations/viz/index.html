<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konkani AMR Annotations</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --header-bg: #1e293b;
            --card-bg: #ffffff;
            --accent: #3b82f6;
            --text-main: #334155;
            --amr-bg: #1e1e1e;
            --amr-text: #ce9178;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Prevent body-level horizontal scroll */
        }

        header {
            background: var(--header-bg);
            color: white;
            padding: 1rem 2rem;
            text-align: center;
        }

        .container {
            max-width: 98vw;
            /* Use almost full viewport width */
            margin: 1rem auto;
            padding: 0 10px;
        }

        .search-container {
            margin-bottom: 1rem;
        }

        #searchBar {
            width: 100%;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            table-layout: fixed;
            /* This is key for preventing overflow */
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid #e2e8f0;
        }

        /* Defining the 3-column widths */
        .col-konkani {
            width: 25%;
        }

        .col-english {
            width: 25%;
        }

        .col-amr {
            width: 50%;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
            word-wrap: break-word;
            /* Force text to wrap */
        }

        .konkani-text {
            font-size: 1rem;
            font-weight: 700;
            color: #4338ca;
        }

        .english-text {
            font-size: 0.95rem;
            color: #475569;
            font-style: italic;
        }

        .amr-pre {
            background: var(--amr-bg);
            color: var(--amr-text);
            padding: 12px;
            border-radius: 6px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            margin: 0;
            /* Wrap long lines and preserve whitespace/tabs */
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Konkani AMR Dataset</h1>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search data..." onkeyup="filterData()">
        </div>

        <table id="dataTable">
            <thead>
                <tr>
                    <th class="col-konkani">Konkani Sentence</th>
                    <th class="col-english">English Translation</th>
                    <th class="col-amr">AMR (Penman)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="3" class="loading">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        let allData = [];

        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                allData = await response.json();
                renderTable(allData);
            } catch (err) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="3">Error loading data.</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(item => `
            <tr>
                <td class="konkani-text">${item.sentence}</td>
                <td class="english-text">${item.english_translation}</td>
                <td>
                    <pre class="amr-pre">${item.amr_penman}</pre>
                </td>
            </tr>
        `).join('');
        }

        function filterData() {
            const query = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allData.filter(item =>
                item.sentence.toLowerCase().includes(query) ||
                item.english_translation.toLowerCase().includes(query) ||
                item.amr_penman.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        window.onload = fetchData;
    </script>

</body>

</html>
